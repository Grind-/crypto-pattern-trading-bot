<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Einstellungen — Crypto Pattern AI</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .page-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .page-header a { color: var(--text-muted); text-decoration: none; font-size: 13px; }
    .page-header a:hover { color: var(--text); }
    .page-title { font-size: 16px; font-weight: 700; }
    .page-body { max-width: 560px; margin: 0 auto; padding: 20px 16px; }
    .radio-row { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .radio-card {
      flex: 1; min-width: 160px;
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color .15s;
    }
    .radio-card.selected { border-color: var(--blue); }
    .radio-card input { display: none; }
    .radio-card-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .radio-card-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
    .success-msg { color: var(--green); font-size: 12px; display: none; margin-top: 8px; }
    .error-msg { color: var(--red); font-size: 12px; display: none; margin-top: 8px; }
    .test-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
    .test-result { font-size: 12px; }
  </style>
</head>
<body>
  <div class="page-header">
    <a href="/">← Zurück</a>
    <span class="page-title">Einstellungen</span>
    <span id="header-username" style="margin-left:auto;color:var(--text-muted);font-size:12px"></span>
  </div>

  <div class="page-body">

    <!-- Claude config -->
    <div class="card">
      <h2>Claude-Zugang</h2>
      <div class="radio-row" id="mode-cards">
        <label class="radio-card" id="card-api_key">
          <input type="radio" name="claude-mode" value="api_key" />
          <div class="radio-card-title">Eigener API-Key</div>
          <div class="radio-card-desc">Anthropic API-Key (sk-ant-…). Pay-per-use über dein Anthropic-Konto.</div>
        </label>
        <label class="radio-card" id="card-platform">
          <input type="radio" name="claude-mode" value="platform" />
          <div class="radio-card-title">Platform-Zugang</div>
          <div class="radio-card-desc">Server-Subscription des Betreibers. Muss vom Admin aktiviert werden.</div>
        </label>
      </div>

      <div id="api-key-section">
        <div class="field" style="margin-bottom:10px">
          <label>Anthropic API-Key</label>
          <input id="api-key-input" type="password" placeholder="sk-ant-api03-…" autocomplete="off" />
        </div>
        <div class="test-row">
          <button class="btn-tiny" id="btn-test" onclick="testConnection()">Verbindung testen</button>
          <span class="test-result" id="test-result"></span>
        </div>
      </div>

      <div id="platform-section" style="display:none">
        <div style="background:rgba(63,185,80,0.08);border:1px solid var(--green);border-radius:6px;
             padding:10px 14px;font-size:12px;color:var(--green)">
          Platform-Zugang aktiv. Claude wird über den Server bereitgestellt.
        </div>
      </div>

      <div class="btn-row" style="margin-top:14px">
        <button class="btn btn-primary" onclick="saveClaudeConfig()">Speichern</button>
      </div>
      <div class="success-msg" id="claude-success">Gespeichert.</div>
      <div class="error-msg" id="claude-error"></div>
    </div>

    <!-- Password change -->
    <div class="card">
      <h2>Passwort ändern</h2>
      <div class="field" style="margin-bottom:10px">
        <label>Aktuelles Passwort</label>
        <input id="cur-pw" type="password" autocomplete="current-password" />
      </div>
      <div class="field" style="margin-bottom:10px">
        <label>Neues Passwort</label>
        <input id="new-pw" type="password" autocomplete="new-password" />
      </div>
      <div class="field" style="margin-bottom:14px">
        <label>Wiederholen</label>
        <input id="new-pw2" type="password" autocomplete="new-password" />
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="changePassword()">Passwort ändern</button>
      </div>
      <div class="success-msg" id="pw-success">Passwort geändert.</div>
      <div class="error-msg" id="pw-error"></div>
    </div>

  </div>

  <script>
    let _mode = 'api_key';

    function selectMode(mode) {
      _mode = mode;
      document.querySelectorAll('.radio-card').forEach(c => c.classList.remove('selected'));
      const card = document.getElementById('card-' + mode);
      if (card) card.classList.add('selected');
      document.querySelector(`input[value="${mode}"]`).checked = true;
      document.getElementById('api-key-section').style.display = mode === 'api_key' ? 'block' : 'none';
      document.getElementById('platform-section').style.display = mode === 'platform' ? 'block' : 'none';
    }

    document.querySelectorAll('input[name="claude-mode"]').forEach(r => {
      r.addEventListener('change', () => selectMode(r.value));
    });
    document.querySelectorAll('.radio-card').forEach(card => {
      card.addEventListener('click', () => {
        const val = card.querySelector('input').value;
        selectMode(val);
      });
    });

    async function loadProfile() {
      const data = await fetch('/api/user/profile').then(r => r.json());
      document.getElementById('header-username').textContent = data.username;
      selectMode(data.claude_mode || 'api_key');
      if (data.has_api_key) {
        document.getElementById('api-key-input').placeholder = '••••••••••••••• (gesetzt)';
      }
      // Hide platform card if not admin (can't self-activate)
      if (data.role !== 'admin') {
        document.getElementById('card-platform').style.opacity = '0.5';
        document.getElementById('card-platform').title = 'Nur durch Admin aktivierbar';
      }
    }

    async function testConnection() {
      const btn = document.getElementById('btn-test');
      const el = document.getElementById('test-result');
      btn.disabled = true;
      el.style.color = 'var(--text-muted)';
      el.textContent = 'Teste…';
      try {
        const r = await fetch('/api/user/test-claude', {method: 'POST'});
        const d = await r.json();
        if (d.ok) {
          el.style.color = 'var(--green)';
          el.textContent = '✓ Verbindung erfolgreich';
        } else {
          el.style.color = 'var(--red)';
          el.textContent = '✗ Verbindung fehlgeschlagen';
        }
      } catch (e) {
        el.style.color = 'var(--red)';
        el.textContent = '✗ Fehler: ' + e.message;
      } finally {
        btn.disabled = false;
      }
    }

    async function saveClaudeConfig() {
      const successEl = document.getElementById('claude-success');
      const errEl = document.getElementById('claude-error');
      successEl.style.display = 'none';
      errEl.style.display = 'none';

      const mode = _mode;
      const api_key = document.getElementById('api-key-input').value.trim() || undefined;
      try {
        const r = await fetch('/api/user/claude-config', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({mode, api_key}),
        });
        if (!r.ok) {
          const d = await r.json().catch(() => ({}));
          errEl.textContent = d.detail || 'Fehler beim Speichern';
          errEl.style.display = 'block';
          return;
        }
        successEl.style.display = 'block';
        if (api_key) {
          document.getElementById('api-key-input').value = '';
          document.getElementById('api-key-input').placeholder = '••••••••••••••• (gesetzt)';
        }
      } catch (e) {
        errEl.textContent = e.message;
        errEl.style.display = 'block';
      }
    }

    async function changePassword() {
      const successEl = document.getElementById('pw-success');
      const errEl = document.getElementById('pw-error');
      successEl.style.display = 'none';
      errEl.style.display = 'none';

      const current_password = document.getElementById('cur-pw').value;
      const new_password = document.getElementById('new-pw').value;
      const confirm = document.getElementById('new-pw2').value;

      if (new_password !== confirm) {
        errEl.textContent = 'Passwörter stimmen nicht überein';
        errEl.style.display = 'block';
        return;
      }
      try {
        const r = await fetch('/api/user/change-password', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({current_password, new_password}),
        });
        if (!r.ok) {
          const d = await r.json().catch(() => ({}));
          errEl.textContent = d.detail || 'Fehler';
          errEl.style.display = 'block';
          return;
        }
        successEl.style.display = 'block';
        document.getElementById('cur-pw').value = '';
        document.getElementById('new-pw').value = '';
        document.getElementById('new-pw2').value = '';
      } catch (e) {
        errEl.textContent = e.message;
        errEl.style.display = 'block';
      }
    }

    loadProfile();
  </script>
</body>
</html>
