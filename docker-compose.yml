services:
  claude-proxy:
    build:
      context: ./claude-proxy
    container_name: crypto-claude-proxy
    volumes:
      - /opt/claude-platform/apps/claude-platform-sandbox/crypto-pattern-ai/claude-proxy/claude.exe:/opt/claude.exe:ro
      - /opt/claude-platform/.home-orchestrator/.claude:/home/claude/.claude:ro
      - /opt/claude-platform/.home-orchestrator/.claude.json:/home/claude/.claude.json:ro
    environment:
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-6}
    networks:
      - crypto-net
    restart: unless-stopped

  crypto-pattern-ai:
    build: .
    container_name: crypto-pattern-ai
    ports:
      - "7891:8080"
    environment:
      - CLAUDE_PROXY_URL=http://claude-proxy:8081
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET:-}
    volumes:
      - /opt/claude-platform/apps/claude-platform-sandbox/crypto-pattern-ai/data:/app/data
      - /opt/claude-platform/apps/claude-platform-sandbox/crypto-pattern-ai/knowledge:/app/knowledge
    depends_on:
      - claude-proxy
    networks:
      - crypto-net
    restart: unless-stopped

networks:
  crypto-net:
    name: crypto-pattern-ai-net
